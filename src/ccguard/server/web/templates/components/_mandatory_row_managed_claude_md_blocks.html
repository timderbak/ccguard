<div class="policy-row border border-slate-200 rounded p-3 space-y-2">
  <div class="flex gap-2">
    <label class="w-64">
      <span class="text-xs text-slate-500">id (kebab-case)</span>
      <input type="text" name="managed_claude_md_blocks[{{ i }}].id"
             value="{{ item.id | default('') }}"
             pattern="[a-z0-9]+(-[a-z0-9]+)*"
             class="mt-1 block w-full rounded border-slate-300 font-mono" />
    </label>
    <label class="flex-1">
      <span class="text-xs text-slate-500">описание (для админов)</span>
      <input type="text" name="managed_claude_md_blocks[{{ i }}].description"
             value="{{ item.description | default('') }}"
             class="mt-1 block w-full rounded border-slate-300" />
    </label>
  </div>
  <label class="block">
    <span class="text-xs text-slate-500">content (вставится в CLAUDE.md между маркерами)</span>
    <textarea name="managed_claude_md_blocks[{{ i }}].content"
              class="mt-1 block w-full rounded border-slate-300 font-mono text-sm min-h-[120px]"
              spellcheck="false">{{ item.content | default('') }}</textarea>
  </label>
  <div class="flex justify-end">
    <button type="button" hx-on:click="this.closest('.policy-row').remove()"
            class="text-xs text-red-600 hover:underline">удалить</button>
  </div>
</div>
