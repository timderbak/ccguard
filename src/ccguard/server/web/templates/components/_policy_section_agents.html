<details class="group bg-white rounded-xl shadow p-5">
    <summary class="cursor-pointer flex items-center justify-between gap-3">
        <span class="flex items-center gap-2.5 font-semibold text-slate-800">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" class="cc-chevron w-3.5 h-3.5 text-slate-400"><path d="m9 18 6-6-6-6"/></svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="w-4 h-4 text-slate-400"><rect x="4" y="7" width="16" height="12" rx="2"/><path d="M12 3v4M9 13h.01M15 13h.01M9 17h6"/></svg>
            Агенты
        </span>
        <span class="cc-sev cc-sev-{{ policy.agents.severity }}">{{ policy.agents.severity }}</span>
    </summary>
    <div class="mt-4 space-y-3 text-sm">
        <label class="block">критичность:
            <select name="agents.severity" class="rounded border-slate-300 ml-2">
                <option value="info"  {% if policy.agents.severity == 'info'  %}selected{% endif %}>info</option>
                <option value="warn"  {% if policy.agents.severity == 'warn'  %}selected{% endif %}>warn</option>
                <option value="block" {% if policy.agents.severity == 'block' %}selected{% endif %}>block</option>
            </select>
        </label>
        <label class="block">allowlist_names (через запятую):
            <input type="text" name="agents.allowlist_names"
                   value="{{ policy.agents.allowlist_names | join(', ') }}"
                   class="mt-1 block w-full rounded border-slate-300" /></label>
        <label class="block">denylist_names (через запятую):
            <input type="text" name="agents.denylist_names"
                   value="{{ policy.agents.denylist_names | join(', ') }}"
                   class="mt-1 block w-full rounded border-slate-300" /></label>
        <label class="block">denylist_tools (через запятую, например Bash, Write, Edit):
            <input type="text" name="agents.denylist_tools"
                   value="{{ policy.agents.denylist_tools | join(', ') }}"
                   class="mt-1 block w-full rounded border-slate-300" /></label>
        <label class="block">trusted_file_hashes (один sha256 на строку):
            <textarea name="agents.trusted_file_hashes" rows="4"
                      class="mt-1 block w-full rounded border-slate-300 font-mono text-xs"
                      >{{ policy.agents.trusted_file_hashes | join('\n') }}</textarea></label>
        <label class="inline-flex items-center">
            <input type="checkbox" name="agents.deny_all_unknown" value="1"
                   {% if policy.agents.deny_all_unknown %}checked{% endif %} />
            <span class="ml-2">блокировать всё неизвестное</span></label>
    </div>
</details>
