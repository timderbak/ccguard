<details class="group bg-white rounded-xl shadow p-5">
    <summary class="cursor-pointer flex items-center justify-between gap-3">
        <span class="flex items-center gap-2.5 font-semibold text-slate-800">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" class="cc-chevron w-3.5 h-3.5 text-slate-400"><path d="m9 18 6-6-6-6"/></svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="w-4 h-4 text-slate-400"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.5 3.8 5.7 3.8 9s-1.3 6.5-3.8 9c-2.5-2.5-3.8-5.7-3.8-9S9.5 5.5 12 3Z"/></svg>
            Сеть
        </span>
        <span class="cc-sev cc-sev-{{ policy.network.severity }}">{{ policy.network.severity }}</span>
    </summary>
    <div class="mt-4 space-y-3 text-sm">
        <label class="block">критичность:
            <select name="network.severity" class="rounded border-slate-300 ml-2">
                <option value="info"  {% if policy.network.severity == 'info'  %}selected{% endif %}>info</option>
                <option value="warn"  {% if policy.network.severity == 'warn'  %}selected{% endif %}>warn</option>
                <option value="block" {% if policy.network.severity == 'block' %}selected{% endif %}>block</option>
            </select>
        </label>
        <label class="block">allowlist_hosts (через запятую):
            <input type="text" name="network.allowlist_hosts"
                   value="{{ policy.network.allowlist_hosts | join(', ') }}"
                   class="mt-1 block w-full rounded border-slate-300" /></label>
        <label class="block">denylist_hosts (через запятую):
            <input type="text" name="network.denylist_hosts"
                   value="{{ policy.network.denylist_hosts | join(', ') }}"
                   class="mt-1 block w-full rounded border-slate-300" /></label>
        <label class="inline-flex items-center">
            <input type="checkbox" name="network.deny_all_unknown" value="1"
                   {% if policy.network.deny_all_unknown %}checked{% endif %} />
            <span class="ml-2">блокировать всё неизвестное</span></label>
    </div>
</details>
