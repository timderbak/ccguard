<div class="policy-row border border-slate-200 rounded p-3 space-y-2">
  <div class="flex gap-2">
    <label class="flex-1">
      <span class="text-xs text-slate-500">name</span>
      <input type="text" name="required_skills[{{ i }}].name"
             value="{{ item.name | default('') }}"
             class="mt-1 block w-full rounded border-slate-300 font-mono" />
    </label>
    <label class="w-48">
      <span class="text-xs text-slate-500">frontmatter type</span>
      <input type="text" name="required_skills[{{ i }}].frontmatter_type"
             value="{{ item.frontmatter_type | default('') }}"
             class="mt-1 block w-full rounded border-slate-300 font-mono" />
    </label>
  </div>
  <label class="block">
    <span class="text-xs text-slate-500">content (SKILL.md)</span>
    <textarea name="required_skills[{{ i }}].content"
              class="mt-1 block w-full rounded border-slate-300 font-mono text-sm min-h-[120px]"
              spellcheck="false">{{ item.content | default('') }}</textarea>
  </label>
  <div class="flex justify-end">
    <button type="button" hx-on:click="this.closest('.policy-row').remove()"
            class="text-xs text-red-600 hover:underline">удалить</button>
  </div>
</div>
