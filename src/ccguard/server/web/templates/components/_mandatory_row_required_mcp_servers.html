<div class="policy-row border border-slate-200 rounded p-3 space-y-2">
  <div class="flex gap-2">
    <label class="flex-1">
      <span class="text-xs text-slate-500">name</span>
      <input type="text" name="required_mcp_servers[{{ i }}].name"
             value="{{ item.name | default('') }}"
             class="mt-1 block w-full rounded border-slate-300 font-mono" />
    </label>
    <label class="flex-1">
      <span class="text-xs text-slate-500">command</span>
      <input type="text" name="required_mcp_servers[{{ i }}].command"
             value="{{ item.command | default('') }}"
             class="mt-1 block w-full rounded border-slate-300 font-mono" />
    </label>
  </div>
  <label class="block">
    <span class="text-xs text-slate-500">args (по одному на строку)</span>
    <textarea name="required_mcp_servers[{{ i }}].args" rows="3"
              class="mt-1 block w-full rounded border-slate-300 font-mono">{{ item.args_text | default(item.args | default([]) | join('\n')) }}</textarea>
  </label>
  <label class="block">
    <span class="text-xs text-slate-500">env (JSON object, например {"KEY":"value"})</span>
    <input type="text" name="required_mcp_servers[{{ i }}].env"
           value="{{ item.env_text | default('{}') }}"
           class="mt-1 block w-full rounded border-slate-300 font-mono" />
  </label>
  <div class="flex justify-end">
    <button type="button" hx-on:click="this.closest('.policy-row').remove()"
            class="text-xs text-red-600 hover:underline">удалить</button>
  </div>
</div>
