<details class="group bg-white rounded-xl shadow p-5">
    <summary class="cursor-pointer flex items-center justify-between gap-3">
        <span class="flex items-center gap-2.5 font-semibold text-slate-800">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" class="cc-chevron w-3.5 h-3.5 text-slate-400"><path d="m9 18 6-6-6-6"/></svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="w-4 h-4 text-slate-400"><path d="M8 3H7a2 2 0 0 0-2 2v4a2 2 0 0 1-2 2 2 2 0 0 1 2 2v4a2 2 0 0 0 2 2h1M16 3h1a2 2 0 0 1 2 2v4a2 2 0 0 0 2 2 2 2 0 0 0-2 2v4a2 2 0 0 1-2 2h-1"/></svg>
            Переменные окружения
        </span>
        <span class="cc-sev cc-sev-{{ policy.env.severity }}">{{ policy.env.severity }}</span>
    </summary>
    <div class="mt-4 space-y-3 text-sm">
        <label class="block">критичность:
            <select name="env.severity" class="rounded border-slate-300 ml-2">
                <option value="info"  {% if policy.env.severity == 'info'  %}selected{% endif %}>info</option>
                <option value="warn"  {% if policy.env.severity == 'warn'  %}selected{% endif %}>warn</option>
                <option value="block" {% if policy.env.severity == 'block' %}selected{% endif %}>block</option>
            </select>
        </label>
        <label class="block">denylist_patterns (одна regex на строку):
            <textarea name="env.denylist_patterns" rows="4"
                      class="mt-1 block w-full rounded border-slate-300 font-mono text-xs"
                      >{{ policy.env.denylist_patterns | join('\n') }}</textarea></label>
        <label class="block">allowlist_names (через запятую):
            <input type="text" name="env.allowlist_names"
                   value="{{ policy.env.allowlist_names | join(', ') }}"
                   class="mt-1 block w-full rounded border-slate-300" /></label>
    </div>
</details>
