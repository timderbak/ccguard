<details class="group bg-white rounded-xl shadow p-5">
    <summary class="cursor-pointer flex items-center justify-between gap-3">
        <span class="flex items-center gap-2.5 font-semibold text-slate-800">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" class="cc-chevron w-3.5 h-3.5 text-slate-400"><path d="m9 18 6-6-6-6"/></svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="w-4 h-4 text-slate-400"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1.5-1.5"/></svg>
            Хуки
        </span>
        <span class="cc-sev cc-sev-{{ policy.hooks.severity }}">{{ policy.hooks.severity }}</span>
    </summary>
    <div class="mt-4 space-y-3 text-sm">
        <label class="block">
            критичность:
            <select name="hooks.severity" class="rounded border-slate-300 ml-2">
                <option value="info"  {% if policy.hooks.severity == 'info'  %}selected{% endif %}>info</option>
                <option value="warn"  {% if policy.hooks.severity == 'warn'  %}selected{% endif %}>warn</option>
                <option value="block" {% if policy.hooks.severity == 'block' %}selected{% endif %}>block</option>
            </select>
        </label>
        <label class="block">
            allowlist_commands (по одной на строку):
            <textarea name="hooks.allowlist_commands" rows="4"
                      class="mt-1 block w-full rounded border-slate-300 font-mono text-xs"
                      >{{ policy.hooks.allowlist_commands | join('\n') }}</textarea>
        </label>
        <label class="inline-flex items-center">
            <input type="checkbox" name="hooks.deny_unknown" value="1"
                   {% if policy.hooks.deny_unknown %}checked{% endif %} />
            <span class="ml-2">блокировать неизвестные</span>
        </label>
    </div>
</details>
