<details open class="group bg-white rounded-xl shadow p-5">
    <summary class="cursor-pointer flex items-center justify-between gap-3">
        <span class="flex items-center gap-2.5 font-semibold text-slate-800">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" class="cc-chevron w-3.5 h-3.5 text-slate-400"><path d="m9 18 6-6-6-6"/></svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="w-4 h-4 text-slate-400"><rect x="3" y="4" width="18" height="6" rx="1.5"/><rect x="3" y="14" width="18" height="6" rx="1.5"/><path d="M7 7h.01M7 17h.01"/></svg>
            MCP-серверы
        </span>
        <span class="cc-sev cc-sev-{{ policy.mcp_servers.severity }}">{{ policy.mcp_servers.severity }}</span>
    </summary>
    <div class="mt-4 space-y-3 text-sm">
        <label class="block">
            критичность:
            <select name="mcp_servers.severity" class="rounded border-slate-300 ml-2">
                <option value="info"  {% if policy.mcp_servers.severity == 'info'  %}selected{% endif %}>info</option>
                <option value="warn"  {% if policy.mcp_servers.severity == 'warn'  %}selected{% endif %}>warn</option>
                <option value="block" {% if policy.mcp_servers.severity == 'block' %}selected{% endif %}>block</option>
            </select>
        </label>
        <label class="block">
            allowlist_names (через запятую):
            <input type="text" name="mcp_servers.allowlist_names"
                   value="{{ policy.mcp_servers.allowlist_names | join(', ') }}"
                   class="mt-1 block w-full rounded border-slate-300" />
        </label>
        <label class="block">
            denylist_names (через запятую):
            <input type="text" name="mcp_servers.denylist_names"
                   value="{{ policy.mcp_servers.denylist_names | join(', ') }}"
                   class="mt-1 block w-full rounded border-slate-300" />
        </label>
        <label class="block">
            denylist_url_patterns (через запятую):
            <input type="text" name="mcp_servers.denylist_url_patterns"
                   value="{{ policy.mcp_servers.denylist_url_patterns | join(', ') }}"
                   class="mt-1 block w-full rounded border-slate-300" />
        </label>
        <label class="block">
            allowlist_url_patterns (через запятую):
            <input type="text" name="mcp_servers.allowlist_url_patterns"
                   value="{{ policy.mcp_servers.allowlist_url_patterns | join(', ') }}"
                   class="mt-1 block w-full rounded border border-slate-300" />
        </label>
        <label class="inline-flex items-center">
            <input type="checkbox" name="mcp_servers.deny_all_unknown" value="1"
                   {% if policy.mcp_servers.deny_all_unknown %}checked{% endif %} />
            <span class="ml-2">блокировать всё неизвестное</span>
        </label>
    </div>
</details>
