<details class="group bg-white rounded-xl shadow p-5">
    <summary class="cursor-pointer flex items-center justify-between gap-3">
        <span class="flex items-center gap-2.5 font-semibold text-slate-800">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" class="cc-chevron w-3.5 h-3.5 text-slate-400"><path d="m9 18 6-6-6-6"/></svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="w-4 h-4 text-slate-400"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="m7 9 3 3-3 3M13 15h4"/></svg>
            Команды
        </span>
        <span class="cc-sev cc-sev-{{ policy.commands.severity }}">{{ policy.commands.severity }}</span>
    </summary>
    <div class="mt-4 space-y-3 text-sm">
        <label class="block">критичность:
            <select name="commands.severity" class="rounded border-slate-300 ml-2">
                <option value="info"  {% if policy.commands.severity == 'info'  %}selected{% endif %}>info</option>
                <option value="warn"  {% if policy.commands.severity == 'warn'  %}selected{% endif %}>warn</option>
                <option value="block" {% if policy.commands.severity == 'block' %}selected{% endif %}>block</option>
            </select>
        </label>
        <label class="block">denylist_patterns (одна regex на строку):
            <textarea name="commands.denylist_patterns" rows="4"
                      class="mt-1 block w-full rounded border-slate-300 font-mono text-xs"
                      >{{ policy.commands.denylist_patterns | join('\n') }}</textarea></label>
        <label class="block">allowlist_patterns (одна regex на строку):
            <textarea name="commands.allowlist_patterns" rows="4"
                      class="mt-1 block w-full rounded border-slate-300 font-mono text-xs"
                      >{{ policy.commands.allowlist_patterns | join('\n') }}</textarea></label>
        <p class="text-xs text-slate-400">always_deny зашит в схеме и не редактируется.</p>
    </div>
</details>
