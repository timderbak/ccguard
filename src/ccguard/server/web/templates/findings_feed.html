{% extends "base.html" %}
{% block title %}ccguard — находки{% endblock %}
{% block content %}
<h2 class="text-2xl font-semibold mb-6">Находки</h2>
<form method="GET" action="/findings" class="bg-white rounded-lg shadow p-4 mb-4 flex gap-4">
    <select name="severity" class="rounded border border-slate-300 text-sm">
        <option value="">все уровни</option>
        <option value="critical" {% if filters.severity == "critical" %}selected{% endif %}>critical</option>
        <option value="block" {% if filters.severity == "block" %}selected{% endif %}>block</option>
        <option value="warn"  {% if filters.severity == "warn"  %}selected{% endif %}>warn</option>
        <option value="info"  {% if filters.severity == "info"  %}selected{% endif %}>info</option>
    </select>
    <label class="sr-only" for="f-scope">Тип</label>
    <select id="f-scope" name="scope"
            class="rounded border-slate-300 px-2 py-1 text-sm
                   focus:ring-2 focus:ring-slate-400 focus:border-slate-500">
        <option value="all" {% if filters.scope == 'all' or not filters.scope %}selected{% endif %}>все типы</option>
        <option value="llm" {% if filters.scope == 'llm' %}selected{% endif %}>только LLM-сканер</option>
        <option value="non_llm" {% if filters.scope == 'non_llm' %}selected{% endif %}>кроме LLM-сканера</option>
    </select>
    <input type="text" name="rule_id" placeholder="rule_id"
           value="{{ filters.rule_id or '' }}" class="rounded border border-slate-300 text-sm" />
    <input type="text" name="machine_id" placeholder="machine_id"
           value="{{ filters.machine_id or '' }}" class="rounded border border-slate-300 text-sm" />
    <button class="bg-slate-900 text-white text-sm rounded px-4">Фильтр</button>
</form>

<div class="bg-white rounded-lg shadow p-4">
    <table class="w-full text-sm">
        <thead><tr class="text-left text-slate-500 border-b">
            <th>Когда</th><th>Машина</th><th>Серьёзность</th><th>Риск</th><th>Правило</th><th>Подробности</th><th class="text-right">Действия</th>
        </tr></thead>
        <tbody>
        {% for finding in findings %}
        {% include "components/_finding_row.html" %}
        {% else %}
        <tr><td colspan="7" class="py-6 text-center text-slate-400">Находок нет.</td></tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
