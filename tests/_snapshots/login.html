<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ccguard — вход</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Chivo:wght@600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"IBM Plex Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              mono: ['"IBM Plex Mono"', 'ui-monospace', 'monospace'],
              display: ['"Chivo"', '"IBM Plex Sans"', 'sans-serif'],
            },
            colors: {
              ink: {
                900: '#0a0e12',
                850: '#0d1318',
                800: '#11181f',
                700: '#1a242d',
                600: '#26333d',
              },
              signal: '#10b981',
            },
            keyframes: {
              ccRise: {
                '0%':   { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              ccPulse: {
                '0%,100%': { opacity: '1' },
                '50%':     { opacity: '.35' },
              },
            },
            animation: {
              ccRise: 'ccRise .5s cubic-bezier(.22,1,.36,1) both',
              ccPulse: 'ccPulse 2.4s ease-in-out infinite',
            },
          },
        },
      };
    </script>
    <style>
      :root { color-scheme: light; }
      body { font-family: "IBM Plex Sans", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
      .font-mono, code, pre, .cc-mono { font-family: "IBM Plex Mono", ui-monospace, monospace; }
      h1, h2, h3, .cc-display { font-family: "Chivo", "IBM Plex Sans", sans-serif; letter-spacing: -0.015em; }

      /* Blueprint atmosphere for the work surface */
      .cc-surface {
        background-color: #eef1f5;
        background-image:
          radial-gradient(900px 500px at 82% -8%, rgba(16,185,129,.10), transparent 60%),
          radial-gradient(760px 480px at -6% 108%, rgba(56,89,120,.12), transparent 55%),
          linear-gradient(to right, rgba(15,23,42,.035) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(15,23,42,.035) 1px, transparent 1px);
        background-size: 100% 100%, 100% 100%, 32px 32px, 32px 32px;
        background-attachment: fixed, fixed, fixed, fixed;
      }

      /* Card refinement applied broadly without touching markup */
      .cc-surface .bg-white {
        border: 1px solid rgba(15,23,42,.07);
        box-shadow: 0 1px 2px rgba(13,19,24,.04), 0 12px 28px -18px rgba(13,19,24,.28);
        transition: box-shadow .25s ease, border-color .25s ease, transform .25s ease;
      }
      .cc-surface .bg-white:hover {
        box-shadow: 0 1px 2px rgba(13,19,24,.05), 0 20px 40px -22px rgba(13,19,24,.36);
        border-color: rgba(16,185,129,.28);
      }

      /* Inputs feel engineered */
      .cc-surface input:not([type=checkbox]):not([type=radio]),
      .cc-surface select,
      .cc-surface textarea {
        background: #fbfcfd;
        transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
      }
      .cc-surface input:focus, .cc-surface select:focus, .cc-surface textarea:focus {
        outline: none;
        border-color: #10b981 !important;
        box-shadow: 0 0 0 3px rgba(16,185,129,.18);
        background: #fff;
      }
      .cc-surface textarea { line-height: 1.55; }

      /* Sidebar nav */
      .cc-nav-link {
        position: relative; display: flex; align-items: center; gap: .625rem;
        padding: .5rem .75rem; border-radius: .55rem; color: #9fb0bd;
        font-size: .875rem; font-weight: 500; transition: all .16s ease; border: 1px solid transparent;
      }
      .cc-nav-link svg { width: 16px; height: 16px; flex: none; opacity: .8; }
      .cc-nav-link:hover { color: #eaf2f6; background: rgba(255,255,255,.05); }
      .cc-nav-link[aria-current="page"] {
        color: #d7ffe9; background: rgba(16,185,129,.12);
        border-color: rgba(16,185,129,.30);
      }
      .cc-nav-link[aria-current="page"] svg { opacity: 1; color: #34d399; }
      .cc-nav-link[aria-current="page"]::before {
        content: ""; position: absolute; left: -4px; top: 18%; bottom: 18%;
        width: 3px; border-radius: 3px; background: #10b981; box-shadow: 0 0 12px rgba(16,185,129,.8);
      }
      .cc-nav-group { font-family: "IBM Plex Mono", monospace; font-size: .625rem; letter-spacing: .18em;
        text-transform: uppercase; color: #5b6b78; padding: .25rem .75rem; margin-top: .5rem; }

      main > * { animation: ccRise .5s cubic-bezier(.22,1,.36,1) both; }

      /* Tidy scrollbars on the console */
      .cc-surface ::-webkit-scrollbar { height: 10px; width: 10px; }
      .cc-surface ::-webkit-scrollbar-thumb { background: rgba(15,23,42,.2); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
      .cc-surface ::-webkit-scrollbar-thumb:hover { background: rgba(15,23,42,.35); background-clip: padding-box; }

      .cc-eyebrow { font-family: "IBM Plex Mono", monospace; font-size: .6875rem; font-weight: 500;
        letter-spacing: .2em; text-transform: uppercase; color: #10b981; }

      /* Accordion sections */
      .cc-surface summary { list-style: none; }
      .cc-surface summary::-webkit-details-marker { display: none; }
      .cc-chevron { transition: transform .2s ease; }
      details[open] > summary .cc-chevron { transform: rotate(90deg); }

      /* Severity tags */
      .cc-sev { display:inline-flex; align-items:center; gap:.35rem; font-family:"IBM Plex Mono",monospace;
        font-size:.625rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
        border-radius:999px; padding:.2rem .55rem; border:1px solid; }
      .cc-sev-info  { color:#475569; background:#f1f5f9; border-color:#e2e8f0; }
      .cc-sev-warn  { color:#d97706; background:#fffbeb; border-color:rgba(217,119,6,.25); }
      .cc-sev-block { color:#dc2626; background:#fef2f2; border-color:rgba(220,38,38,.25); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    
    
<div class="min-h-screen flex items-center justify-center">
    <form method="POST" action="/login" class="bg-white p-8 rounded-lg shadow-md w-96">
        <h1 class="text-2xl font-semibold mb-6">ccguard</h1>
        <label class="block mb-4">
            <span class="text-sm">Логин</span>
            <input type="text" name="username" required
                   class="mt-1 block w-full rounded border border-slate-300" />
        </label>
        <label class="block mb-4">
            <span class="text-sm">Пароль</span>
            <input type="password" name="password" required
                   class="mt-1 block w-full rounded border border-slate-300" />
        </label>
        <button type="submit"
                class="w-full bg-slate-900 text-white rounded py-2">
            Войти
        </button>
    </form>
</div>

    
</body>
</html>
